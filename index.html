<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYS.MAIL // INBOX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background-color: #000000; color: #EFEFEF; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Hacker Scrollbar Minimalist */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333333; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #00FF9D; }
        
        /* Glassmorphism & Cyber Borders */
        .glass-panel { background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .cyber-border { border: 1px solid rgba(0, 255, 157, 0.2); }
        .cyber-glow { box-shadow: 0 0 15px rgba(0, 255, 157, 0.1); }
        .cyber-glow-active { box-shadow: 0 0 20px rgba(0, 255, 157, 0.25); }
        
        /* Iframe Reset */
        .iframe-container iframe { width: 100%; height: 100%; border: none; border-radius: 8px; background: #ffffff; filter: invert(0.9) hue-rotate(180deg); opacity: 0.9; transition: filter 0.3s; }
        .iframe-container iframe:hover { filter: invert(0); opacity: 1; }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { cyberGreen: '#00FF9D', cyberGreenDark: '#00CC7D', darkBg: '#000000', darkSurface: '#0A0A0A', darkBorder: '#1A1A1A' } } }
        }
    </script>
</head>
<body class="h-screen flex flex-col overflow-hidden selection:bg-cyberGreen selection:text-black">

    <div id="system-modal" class="fixed inset-0 z-50 bg-black/90 glass-panel flex items-center justify-center p-4 transition-opacity duration-700">
        <div class="bg-darkSurface p-8 rounded-3xl max-w-sm w-full border border-darkBorder cyber-glow">
            <div class="w-12 h-12 border-2 border-cyberGreen/30 rounded-xl flex items-center justify-center mx-auto mb-6 relative overflow-hidden">
                <div class="absolute inset-0 bg-cyberGreen/10 animate-pulse"></div>
                <svg class="w-6 h-6 text-cyberGreen relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 9l3 3-3 3m5 0h3M4 15h16a1 1 0 001-1V6a1 1 0 00-1-1H4a1 1 0 00-1 1v8a1 1 0 001 1z"></path></svg>
            </div>
            <h2 class="text-xl font-mono font-bold mb-1 tracking-tight text-center text-white">SYS.INIT //</h2>
            <p class="text-xs font-mono text-gray-500 mb-8 text-center uppercase tracking-widest">Awaiting Network Config</p>
            
            <div class="space-y-5 mb-8">
                <div>
                    <label class="text-[10px] font-mono text-cyberGreen uppercase tracking-widest mb-2 block">Endpoint.URL</label>
                    <input type="text" id="setup-worker" placeholder="https://..." class="w-full bg-black border border-darkBorder rounded-xl px-4 py-3 focus:outline-none focus:border-cyberGreen focus:ring-1 focus:ring-cyberGreen text-sm font-mono text-gray-300 transition-all placeholder-gray-800">
                </div>
                <div>
                    <label class="text-[10px] font-mono text-cyberGreen uppercase tracking-widest mb-2 block">Valid.Domains</label>
                    <input type="text" id="setup-domains" placeholder="domain1.com, domain2.net" class="w-full bg-black border border-darkBorder rounded-xl px-4 py-3 focus:outline-none focus:border-cyberGreen focus:ring-1 focus:ring-cyberGreen text-sm font-mono text-gray-300 transition-all placeholder-gray-800" onkeypress="if(event.key === 'Enter') initializeSystem()">
                </div>
            </div>
            
            <button onclick="initializeSystem()" class="w-full bg-cyberGreen hover:bg-cyberGreenDark text-black font-mono font-bold text-sm py-3.5 rounded-xl transition-all transform active:scale-[0.98] cyber-glow-active">EXECUTE</button>
            <button onclick="resetConfig()" id="btn-reset" class="w-full mt-4 text-[10px] font-mono text-gray-600 hover:text-red-500 transition-colors hidden uppercase tracking-widest">Wipe Config</button>
        </div>
    </div>

    <div id="app-interface" class="hidden flex-col h-full opacity-0 transition-opacity duration-1000">
        
        <header class="glass-panel border-b border-darkBorder flex flex-col md:flex-row items-center justify-between px-6 py-4 z-20 shrink-0 gap-4 relative">
            <div class="absolute top-0 left-0 h-[1px] bg-gradient-to-r from-transparent via-cyberGreen to-transparent w-full opacity-30"></div>
            
            <div class="flex items-center justify-between w-full md:w-auto gap-6">
                <div class="flex items-center gap-4">
                    <div class="w-8 h-8 bg-black border border-darkBorder rounded-lg flex items-center justify-center text-cyberGreen shadow-[0_0_10px_rgba(0,255,157,0.1)]">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                    <div>
                        <h1 class="text-sm font-mono font-bold tracking-widest text-white uppercase">Svara.Node</h1>
                        <p class="text-[9px] font-mono uppercase tracking-widest text-cyberGreen flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-cyberGreen animate-pulse"></span> Uplink Active</p>
                    </div>
                </div>
                <button onclick="showConfig()" class="p-2 rounded-lg bg-black border border-darkBorder text-gray-500 hover:text-cyberGreen hover:border-cyberGreen transition-all" title="System Settings">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </button>
            </div>

            <div class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto">
                <div class="flex items-center bg-black border border-darkBorder rounded-xl overflow-hidden w-full sm:w-auto transition-all focus-within:border-cyberGreen focus-within:shadow-[0_0_10px_rgba(0,255,157,0.1)]">
                    <input type="text" id="alias-input" placeholder="root" class="bg-transparent px-4 py-2 w-full sm:w-32 focus:outline-none text-sm font-mono text-right text-white placeholder-gray-700" onkeypress="if(event.key === 'Enter') setCustomAlias()">
                    <div class="relative border-l border-darkBorder bg-darkSurface flex items-center">
                        <span class="pl-3 text-cyberGreen text-sm font-mono pointer-events-none">@</span>
                        <select id="domain-select" class="bg-transparent text-gray-400 font-mono text-xs py-2.5 pr-8 pl-1 focus:outline-none appearance-none cursor-pointer hover:text-white transition-colors" onchange="setCustomAlias()"></select>
                        <div class="absolute right-3 pointer-events-none text-gray-600"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg></div>
                    </div>
                </div>
                <div class="flex gap-2 w-full sm:w-auto">
                    <button onclick="setCustomAlias()" class="flex-1 sm:flex-none px-4 py-2 bg-darkSurface hover:bg-darkBorder border border-darkBorder text-gray-300 font-mono text-xs uppercase tracking-wider rounded-xl transition-all active:scale-95">Set_ID</button>
                    <button onclick="generateRandom()" class="flex-1 sm:flex-none px-4 py-2 bg-cyberGreen hover:bg-cyberGreenDark text-black font-mono font-bold text-xs uppercase tracking-wider rounded-xl transition-all shadow-[0_0_15px_rgba(0,255,157,0.2)] flex items-center justify-center gap-2 active:scale-95">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> Gen.RX
                    </button>
                </div>
            </div>
        </header>

        <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative z-10 max-w-[1400px] w-full mx-auto p-4 gap-4">
            
            <aside class="w-full md:w-[320px] lg:w-[360px] bg-darkSurface border border-darkBorder rounded-2xl flex flex-col h-1/2 md:h-full shrink-0 overflow-hidden relative">
                <div class="absolute top-0 left-0 w-4 h-4 border-t border-l border-cyberGreen rounded-tl-2xl opacity-50"></div>
                <div class="absolute top-0 right-0 w-4 h-4 border-t border-r border-cyberGreen rounded-tr-2xl opacity-50"></div>

                <div class="p-4 border-b border-darkBorder flex justify-between items-center bg-black/40">
                    <h2 class="text-[10px] font-mono text-gray-500 uppercase tracking-widest flex items-center gap-2">
                        <svg class="w-3 h-3 text-cyberGreen" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        DATA_STREAM
                    </h2>
                    <button onclick="fetchEmails()" id="refresh-btn" class="text-gray-500 hover:text-cyberGreen transition-colors p-1.5 rounded-lg hover:bg-black" title="Force Sync">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>
                </div>
                <div id="email-list" class="flex-1 overflow-y-auto custom-scrollbar">
                    <div class="flex flex-col items-center justify-center h-full text-gray-600 p-8 text-center space-y-4" id="empty-state">
                        <div class="w-12 h-12 bg-black border border-darkBorder rounded-xl flex items-center justify-center mb-1 relative">
                            <div class="absolute inset-0 bg-cyberGreen/5 blur-md"></div>
                            <svg class="w-5 h-5 text-gray-600 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                        </div>
                        <div>
                            <p class="text-xs font-mono tracking-widest uppercase text-gray-500 mb-1">LISTENING...</p>
                            <p class="text-[10px] font-mono text-gray-700">Port open. Awaiting packets.</p>
                        </div>
                    </div>
                </div>
            </aside>

            <section class="flex-1 flex flex-col bg-darkSurface border border-darkBorder rounded-2xl h-1/2 md:h-full overflow-hidden relative">
                <div class="absolute bottom-0 right-0 w-4 h-4 border-b border-r border-cyberGreen rounded-br-2xl opacity-50 z-20"></div>

                <div id="reader-empty" class="absolute inset-0 flex flex-col items-center justify-center bg-black/20 z-10">
                    <svg class="w-12 h-12 mb-4 text-gray-800" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm0 22c-5.514 0-10-4.486-10-10s4.486-10 10-10 10 4.486 10 10-4.486 10-10 10zm-2-15v4.586l3.293 3.293 1.414-1.414-2.707-2.707v-3.758h-2z"/></svg>
                    <p class="font-mono text-xs tracking-widest text-gray-600 uppercase">NO_TARGET_SELECTED</p>
                </div>
                
                <div id="reader-content" class="hidden flex-col h-full bg-black/40">
                    <div class="p-6 md:p-8 border-b border-darkBorder bg-darkSurface shrink-0">
                        <div class="flex items-center gap-2 mb-4">
                            <span class="px-2 py-0.5 rounded text-[9px] font-mono bg-cyberGreen/10 text-cyberGreen border border-cyberGreen/20 uppercase tracking-wider">DECRYPTED</span>
                            <span id="view-date" class="text-gray-500 text-[10px] font-mono uppercase tracking-wider">Date</span>
                        </div>
                        <h2 id="view-subject" class="text-xl md:text-2xl font-semibold mb-6 leading-tight text-white">Subject</h2>
                        
                        <div class="flex items-center gap-4 bg-black border border-darkBorder rounded-xl p-4">
                            <div class="w-10 h-10 rounded-lg bg-darkBorder flex items-center justify-center text-gray-400 font-mono text-lg" id="view-avatar">A</div>
                            <div class="overflow-hidden">
                                <p class="text-[10px] font-mono text-gray-500 uppercase tracking-widest mb-0.5">SOURCE_ORIGIN</p>
                                <p id="view-sender" class="font-medium text-gray-200 text-sm truncate">Sender</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex-1 overflow-y-auto custom-scrollbar p-6 md:p-8 relative iframe-container">
                        <iframe id="view-body-html" sandbox class="hidden border border-darkBorder"></iframe>
                        <div id="view-body-text" class="text-gray-300 whitespace-pre-wrap font-mono text-sm leading-relaxed hidden bg-black p-6 rounded-xl border border-darkBorder"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // GLOBAL STATE
        let WORKER_URL = localStorage.getItem('tempmail_worker') || '';
        let AVAILABLE_DOMAINS = (localStorage.getItem('tempmail_domains') || '').split(',').map(d => d.trim()).filter(Boolean);
        let currentAddress = '';
        let emailsData = [];
        let pollingInterval;

        window.onload = () => {
            if (WORKER_URL && AVAILABLE_DOMAINS.length > 0) {
                document.getElementById('system-modal').style.display = 'none';
                document.getElementById('app-interface').classList.remove('hidden');
                setTimeout(() => document.getElementById('app-interface').classList.remove('opacity-0'), 100);
                populateDomainDropdown();
                generateRandom();
            }
        };

        function populateDomainDropdown() {
            const domainSelect = document.getElementById('domain-select');
            domainSelect.innerHTML = '';
            AVAILABLE_DOMAINS.forEach(domain => {
                const option = document.createElement('option');
                option.value = domain; option.textContent = domain;
                domainSelect.appendChild(option);
            });
        }

        function initializeSystem() {
            const workerInput = document.getElementById('setup-worker').value.trim().replace(/\/$/, "");
            const domainsInput = document.getElementById('setup-domains').value.trim();
            
            if (!workerInput || !domainsInput) return alert("ERR: Endpoint URL and Domains required.");
            
            WORKER_URL = workerInput;
            AVAILABLE_DOMAINS = domainsInput.split(',').map(d => d.trim()).filter(Boolean);
            
            localStorage.setItem('tempmail_worker', WORKER_URL);
            localStorage.setItem('tempmail_domains', AVAILABLE_DOMAINS.join(', '));
            populateDomainDropdown();

            document.getElementById('system-modal').classList.add('opacity-0');
            setTimeout(() => {
                document.getElementById('system-modal').style.display = 'none';
                const app = document.getElementById('app-interface');
                app.classList.remove('hidden');
                setTimeout(() => app.classList.remove('opacity-0'), 100);
                generateRandom();
            }, 700);
        }

        function showConfig() {
            document.getElementById('setup-worker').value = WORKER_URL;
            document.getElementById('setup-domains').value = AVAILABLE_DOMAINS.join(', ');
            document.getElementById('btn-reset').classList.remove('hidden');
            
            document.getElementById('system-modal').style.display = 'flex';
            setTimeout(() => document.getElementById('system-modal').classList.remove('opacity-0'), 50);
        }

        function resetConfig() {
            localStorage.removeItem('tempmail_worker');
            localStorage.removeItem('tempmail_domains');
            location.reload();
        }

        function updateAliasUI() {
            const parts = currentAddress.split('@');
            document.getElementById('alias-input').value = parts[0];
            document.getElementById('domain-select').value = parts[1];
        }

        function generateRandom() {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let alias = '';
            for(let i=0; i<8; i++) alias += chars.charAt(Math.floor(Math.random() * chars.length));
            const selectedDomain = document.getElementById('domain-select').value || AVAILABLE_DOMAINS[0];
            currentAddress = alias + '@' + selectedDomain;
            updateAliasUI(); resetWorkspace(); fetchEmails(); startPolling();
        }

        function setCustomAlias() {
            let alias = document.getElementById('alias-input').value.trim().toLowerCase().replace(/[^a-z0-9.-]/g, '');
            const selectedDomain = document.getElementById('domain-select').value;
            if(!alias) return generateRandom();
            currentAddress = alias + '@' + selectedDomain;
            updateAliasUI(); resetWorkspace(); fetchEmails(); startPolling();
        }

        function startPolling() {
            if(pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(() => {
                if (!document.hidden && currentAddress) fetchEmails();
            }, 30000); 
        }

        document.addEventListener("visibilitychange", () => {
            if (!document.hidden && currentAddress) fetchEmails();
        });

        function resetWorkspace() {
            emailsData = []; renderList();
            document.getElementById('reader-empty').classList.remove('hidden');
            document.getElementById('reader-content').classList.add('hidden');
        }

        async function fetchEmails() {
            if(!currentAddress || !WORKER_URL) return;
            const btn = document.getElementById('refresh-btn');
            btn.classList.add('animate-spin', 'text-cyberGreen');
            try {
                const response = await fetch(`${WORKER_URL}/api/emails?address=${currentAddress}`);
                if (!response.ok) throw new Error("Connection failed");
                const data = await response.json();
                if(JSON.stringify(data) !== JSON.stringify(emailsData)) { emailsData = data; renderList(); }
            } catch (err) { console.error("Sync ERR:", err);
            } finally { setTimeout(() => btn.classList.remove('animate-spin', 'text-cyberGreen'), 500); }
        }

        function renderList() {
            const container = document.getElementById('email-list');
            const emptyState = document.getElementById('empty-state');
            if(emailsData.length === 0) { container.innerHTML = ''; container.appendChild(emptyState); emptyState.style.display = 'flex'; return; }
            emptyState.style.display = 'none'; container.innerHTML = '';

            emailsData.forEach(email => {
                const senderName = email.sender.replace(/<.*>/, '').trim() || email.sender;
                const time = new Date(email.created_at).toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });
                const div = document.createElement('div');
                div.className = `p-4 border-b border-darkBorder cursor-pointer transition-all hover:bg-black group relative`;
                div.onclick = () => viewEmail(email.id, div);
                div.innerHTML = `
                    <div class="absolute left-0 top-0 bottom-0 w-0.5 bg-cyberGreen opacity-0 transition-opacity group-hover:opacity-50"></div>
                    <div class="flex justify-between items-baseline mb-2"><h3 class="font-mono text-xs font-bold text-gray-200 truncate pr-2 group-hover:text-cyberGreen transition-colors">> ${senderName}</h3><span class="text-[9px] font-mono text-gray-500 shrink-0">${time}</span></div>
                    <p class="text-sm text-gray-400 font-medium truncate mb-1.5">${email.subject}</p>
                    <p class="text-[11px] font-mono text-gray-600 truncate">${email.body_text}</p>`;
                container.appendChild(div);
            });
        }

        function viewEmail(id, element) {
            document.querySelectorAll('#email-list > div').forEach(el => {
                el.classList.remove('bg-black');
                el.children[0].classList.remove('opacity-100'); el.children[0].classList.add('opacity-0');
            });
            element.classList.add('bg-black');
            element.children[0].classList.remove('opacity-0'); element.children[0].classList.add('opacity-100');
            
            const email = emailsData.find(e => e.id === id);
            if(!email) return;
            
            document.getElementById('reader-empty').classList.add('hidden');
            document.getElementById('reader-content').classList.remove('hidden'); document.getElementById('reader-content').classList.add('flex');
            document.getElementById('view-subject').textContent = email.subject; document.getElementById('view-sender').textContent = email.sender;
            document.getElementById('view-avatar').textContent = email.sender.charAt(0).toUpperCase();
            document.getElementById('view-date').textContent = new Date(email.created_at).toLocaleString('en-US', { hour12: false, dateStyle: 'medium', timeStyle: 'short' }) + ' UTC';
            
            const htmlView = document.getElementById('view-body-html'); const textView = document.getElementById('view-body-text');
            if (email.body_html && email.body_html.trim() !== '') { 
                htmlView.srcdoc = email.body_html; htmlView.classList.remove('hidden'); textView.classList.add('hidden'); 
            } else { 
                textView.textContent = email.body_text; textView.classList.remove('hidden'); htmlView.classList.add('hidden'); 
            }
        }
    </script>
</body>
</html>
